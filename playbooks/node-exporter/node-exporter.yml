---
# node-exporter.yml - Deploy node-exporter on VPS as a systemd service
#
# Installs Prometheus node-exporter natively (no Docker) with collectors
# matching the myserver Docker deployment plus conntrack for NAT monitoring.
# Binds to the Tailscale IP so metrics are only reachable over the tailnet.
#
# Prerequisites:
#   - Tailscale must be installed and connected (run tailscale.yml first)
#
# Usage:
#   ansible-playbook playbooks/node-exporter/node-exporter.yml

- name: Deploy node-exporter on VPS
  hosts: vps
  become: true
  gather_facts: true

  vars:
    node_exporter_version: "1.9.0"
    node_exporter_arch: "linux-amd64"

  tasks:
    - name: Create node_exporter system user
      ansible.builtin.user:
        name: node_exporter
        system: true
        shell: /usr/sbin/nologin
        create_home: false

    - name: Check if node_exporter is already installed
      ansible.builtin.stat:
        path: /usr/local/bin/node_exporter
      register: node_exporter_binary

    - name: Get installed version
      ansible.builtin.command: /usr/local/bin/node_exporter --version
      register: installed_version
      changed_when: false
      failed_when: false
      when: node_exporter_binary.stat.exists

    - name: Download and install node_exporter
      when: >
        not node_exporter_binary.stat.exists or
        (installed_version.stderr is defined and node_exporter_version not in installed_version.stderr)
      block:
        - name: Download node_exporter tarball
          ansible.builtin.get_url:
            url: "https://github.com/prometheus/node_exporter/releases/download/v{{ node_exporter_version }}/node_exporter-{{ node_exporter_version }}.{{ node_exporter_arch }}.tar.gz"
            dest: /tmp/node_exporter.tar.gz
            mode: "0644"

        - name: Extract node_exporter
          ansible.builtin.unarchive:
            src: /tmp/node_exporter.tar.gz
            dest: /tmp
            remote_src: true

        - name: Install node_exporter binary
          ansible.builtin.copy:
            src: "/tmp/node_exporter-{{ node_exporter_version }}.{{ node_exporter_arch }}/node_exporter"
            dest: /usr/local/bin/node_exporter
            owner: root
            group: root
            mode: "0755"
            remote_src: true
          notify: restart node_exporter

        - name: Clean up tarball
          ansible.builtin.file:
            path: "{{ item }}"
            state: absent
          loop:
            - /tmp/node_exporter.tar.gz
            - "/tmp/node_exporter-{{ node_exporter_version }}.{{ node_exporter_arch }}"

    - name: Get Tailscale IP
      ansible.builtin.command: tailscale ip -4
      register: tailscale_ip
      changed_when: false

    - name: Deploy node_exporter systemd service
      ansible.builtin.copy:
        dest: /etc/systemd/system/node_exporter.service
        mode: "0644"
        content: |
          [Unit]
          Description=Prometheus Node Exporter
          After=network-online.target
          Wants=network-online.target

          [Service]
          User=node_exporter
          Group=node_exporter
          Type=simple
          ExecStart=/usr/local/bin/node_exporter \
            --web.listen-address={{ tailscale_ip.stdout }}:9100 \
            --collector.systemd \
            --collector.tcpstat \
            --collector.qdisc \
            --collector.processes \
            --collector.interrupts \
            --collector.conntrack \
            --collector.filesystem.mount-points-exclude='^/(sys|proc|dev|host|etc)($$|/)'
          Restart=always
          RestartSec=5
          AmbientCapabilities=CAP_NET_ADMIN CAP_SYS_PTRACE
          ProtectSystem=strict
          ProtectHome=true
          NoNewPrivileges=true

          [Install]
          WantedBy=multi-user.target
      notify: restart node_exporter

    - name: Enable and start node_exporter
      ansible.builtin.systemd:
        name: node_exporter
        enabled: true
        state: started
        daemon_reload: true

    - name: Allow node_exporter port on Tailscale interface only
      ansible.builtin.command: ufw allow in on tailscale0 to any port 9100 proto tcp
      register: ufw_result
      changed_when: "'Skipping' not in ufw_result.stdout"

    - name: Verify node_exporter is responding
      ansible.builtin.uri:
        url: http://{{ tailscale_ip.stdout }}:9100/metrics
        return_content: false
        status_code: 200
      retries: 3
      delay: 5

  handlers:
    - name: Restart node_exporter
      ansible.builtin.systemd:
        name: node_exporter
        state: restarted
        daemon_reload: true
      listen: restart node_exporter
