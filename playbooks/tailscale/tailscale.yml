---
# tailscale.yml - Install and configure Tailscale on VPS and myserver
#
# Connects both hosts via Tailscale mesh VPN so that myserver can reach
# VPS services (e.g. node-exporter) over a private encrypted link.
#
# Prerequisites:
#   1. Create a reusable pre-auth key in the Tailscale admin console
#   2. Store it in Vault:
#        vault kv put secret/tailscale authkey=tskey-auth-...
#
# Usage:
#   ansible-playbook playbooks/tailscale/tailscale.yml

- name: Install and configure Tailscale
  hosts: vps:myserver
  become: true
  gather_facts: true

  vars_files:
    - ../../vars.yml

  tasks:
    - name: Gather controller facts
      ansible.builtin.setup:
      delegate_to: localhost
      delegate_facts: true
      run_once: true
      become: false

    - name: Verify running from myserver (Vault access required)
      ansible.builtin.assert:
        that:
          - myserver_ip in hostvars['localhost']['ansible_all_ipv4_addresses']
        fail_msg: "This playbook must be run from myserver ({{ myserver_ip }}) for Vault access"
      run_once: true

    - name: Read Tailscale auth key from Vault
      ansible.builtin.command:
        cmd: vault kv get -field=authkey secret/tailscale
      delegate_to: localhost
      become: false
      run_once: true
      register: vault_tailscale_authkey
      no_log: true

    - name: Install apt-transport-https and gnupg
      ansible.builtin.apt:
        name:
          - apt-transport-https
          - gnupg
        state: present
        update_cache: true

    - name: Add Tailscale GPG key
      ansible.builtin.get_url:
        url: https://pkgs.tailscale.com/stable/{{ ansible_distribution | lower }}/{{ ansible_distribution_release }}.noarmor.gpg
        dest: /usr/share/keyrings/tailscale-archive-keyring.gpg
        mode: "0644"

    - name: Add Tailscale apt repository
      ansible.builtin.apt_repository:
        repo: >-
          deb [signed-by=/usr/share/keyrings/tailscale-archive-keyring.gpg]
          https://pkgs.tailscale.com/stable/{{ ansible_distribution | lower }}
          {{ ansible_distribution_release }} main
        filename: tailscale
        state: present

    - name: Install Tailscale
      ansible.builtin.apt:
        name: tailscale
        state: present
        update_cache: true

    - name: Enable and start tailscaled
      ansible.builtin.systemd:
        name: tailscaled
        enabled: true
        state: started

    - name: Check if already authenticated
      ansible.builtin.command: tailscale status
      register: tailscale_status
      changed_when: false
      failed_when: false

    - name: Authenticate with Tailscale
      ansible.builtin.command:
        cmd: >-
          tailscale up
          --authkey={{ vault_tailscale_authkey.stdout }}
          {{ '--shields-up' if 'myserver' in group_names else '' }}
      when: tailscale_status.rc != 0
      no_log: true

    - name: Enable shields-up on myserver
      ansible.builtin.command: tailscale set --shields-up
      when: "'myserver' in group_names"
      changed_when: false

    - name: Get Tailscale IP
      ansible.builtin.command: tailscale ip -4
      register: tailscale_ip
      changed_when: false

    - name: Display Tailscale IP
      ansible.builtin.debug:
        msg: "{{ inventory_hostname }} Tailscale IP: {{ tailscale_ip.stdout }}"
