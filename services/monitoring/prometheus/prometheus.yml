global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alert-rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['host.docker.internal:9100']
        labels:
          environment: 'local'
      - targets: ['100.109.18.113:9100']
        labels:
          environment: 'vps'

  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']

  - job_name: 'frigate'
    static_configs:
      - targets: ['frigate:5000']
    metrics_path: /api/metrics

  - job_name: 'traefik'
    static_configs:
      - targets: ['traefik:8080']
