server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: containers
    static_configs:
      - targets:
          - localhost
        labels:
          job: containerlogs
          __path__: /var/lib/docker/containers/*/*log
    pipeline_stages:
      - json:
          expressions:
            output: log
            stream: stream
            attrs:
      - json:
          expressions:
            tag:
          source: attrs
      - regex:
          expression: '^(?P<container_name>[^/]+)/'
          source: tag
      - labels:
          stream:
          container_name:
      - output:
          source: output

  - job_name: syslog
    static_configs:
      - targets:
          - localhost
        labels:
          job: syslog
          __path__: /var/log/syslog

  - job_name: authlog
    static_configs:
      - targets:
          - localhost
        labels:
          job: authlog
          __path__: /var/log/auth.log

  - job_name: cloudtrail
    static_configs:
      - targets:
          - localhost
        labels:
          job: cloudtrail
          __path__: /cloudtrail/**/*.ndjson
    pipeline_stages:
      - json:
          expressions:
            event_time: eventTime
            event_source: eventSource
            event_name: eventName
            aws_region: awsRegion
            source_ip: sourceIPAddress
            error_code: errorCode
            user_identity: userIdentity
      - json:
          expressions:
            user_type: type
            user_name: userName
          source: user_identity
      - timestamp:
          source: event_time
          format: "2006-01-02T15:04:05Z"
      - labels:
          event_source:
          event_name:
          aws_region:
          error_code:
          user_type:
