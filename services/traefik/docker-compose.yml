services:
  traefik:
    image: traefik:v3.6
    container_name: traefik
    command:
      - "--api.dashboard=true"
      - "--api.insecure=true"
      - "--metrics.prometheus=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.letsencrypt.acme.dnschallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.dnschallenge.provider=route53"
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/acme/acme.json"
    environment:
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_REGION=${AWS_REGION}
      - AWS_HOSTED_ZONE_ID=${AWS_HOSTED_ZONE_ID}
    ports:
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /opt/traefik/acme:/acme
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dashboard.rule=Host(`traefik.${DOMAIN}`)"
      - "traefik.http.routers.dashboard.entrypoints=websecure"
      - "traefik.http.routers.dashboard.tls.certresolver=letsencrypt"
      - "traefik.http.routers.dashboard.service=api@internal"
      - "traefik.http.routers.dashboard.middlewares=authelia@docker"
      # Redirect plex.domain to port 32400 (Plex runs in host network mode)
      - "traefik.http.routers.plex-redirect.rule=Host(`plex.${DOMAIN}`)"
      - "traefik.http.routers.plex-redirect.entrypoints=websecure"
      - "traefik.http.routers.plex-redirect.tls.certresolver=letsencrypt"
      - "traefik.http.routers.plex-redirect.service=api@internal"
      - "traefik.http.routers.plex-redirect.middlewares=plex-redirect@docker"
      - "traefik.http.middlewares.plex-redirect.redirectregex.regex=^https://plex\\.${DOMAIN}(.*)"
      - "traefik.http.middlewares.plex-redirect.redirectregex.replacement=http://plex.${DOMAIN}:32400$${1}"
      - "traefik.http.middlewares.plex-redirect.redirectregex.permanent=true"
    networks:
      - traefik-public
    restart: unless-stopped

networks:
  traefik-public:
    name: traefik-public
