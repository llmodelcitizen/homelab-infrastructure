services:
  authelia:
    image: authelia/authelia:latest
    container_name: authelia
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - AUTHELIA_IDENTITY_VALIDATION_RESET_PASSWORD_JWT_SECRET=${AUTHELIA_JWT_SECRET}
      - AUTHELIA_SESSION_SECRET=${AUTHELIA_SESSION_SECRET}
      - AUTHELIA_STORAGE_ENCRYPTION_KEY=${AUTHELIA_STORAGE_ENCRYPTION_KEY}
      - AUTHELIA_NOTIFIER_SMTP_USERNAME=${SMTP_USERNAME}
      - AUTHELIA_NOTIFIER_SMTP_PASSWORD=${SMTP_PASSWORD}
      - TZ=America/New_York
    volumes:
      - /opt/authelia/configuration.yml:/config/configuration.yml:ro
      - ./users_database.yml:/config/users_database.yml
      - /opt/authelia/data:/data
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.authelia.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.authelia.entrypoints=websecure"
      - "traefik.http.routers.authelia.tls.certresolver=letsencrypt"
      - "traefik.http.services.authelia.loadbalancer.server.port=9091"
      - "traefik.docker.network=traefik-public"
      # ForwardAuth middleware for other services
      - "traefik.http.middlewares.authelia.forwardAuth.address=http://authelia:9091/api/authz/forward-auth"
      - "traefik.http.middlewares.authelia.forwardAuth.trustForwardHeader=true"
      - "traefik.http.middlewares.authelia.forwardAuth.authResponseHeaders=Remote-User,Remote-Groups,Remote-Email,Remote-Name"
    networks:
      - traefik-public
      - default
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: authelia_redis
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - /opt/authelia/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - default
    restart: unless-stopped

networks:
  traefik-public:
    external: true
