services:
  frigate:
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,video,utility
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    container_name: frigate
    privileged: false
    restart: always
    stop_grace_period: 30s
    image: ghcr.io/blakeblackshear/frigate:stable-tensorrt
    shm_size: "2048mb"
    devices:
      - /dev/bus/usb:/dev/bus/usb
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /opt/frigate/config:/config
      - /mnt/ssd3/frigate:/media/frigate
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frigate.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.frigate.entrypoints=websecure"
      - "traefik.http.routers.frigate.tls.certresolver=letsencrypt"
      - "traefik.http.routers.frigate.middlewares=authelia@docker"
      - "traefik.http.services.frigate.loadbalancer.server.port=5000"
      - "traefik.docker.network=traefik-public"
    ports:
      - "8971:8971"
      - "1984:1984" # go2RTC web UI
      - "8554:8554" # RTSP feeds
      - "8555:8555/tcp" # WebRTC over tcp
      - "8555:8555/udp" # WebRTC over udp
    networks:
      - traefik-public
      - default

networks:
  traefik-public:
    external: true
